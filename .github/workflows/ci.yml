name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  # Global Environment Variables (Injected via GitHub Secrets)
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://wmxwjkmxyrngvitxseei.supabase.co' }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'mock_anon_key' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'mock_service_key' }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'mock_gemini_key' }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'mock_openai_key' }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'mock_openrouter_key' }}
  GSTIN_API_KEY: ${{ secrets.GSTIN_API_KEY || 'mock_gstin_key' }}
  META_APP_SECRET: ${{ secrets.META_APP_SECRET || 'mock_meta_secret' }}

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-mock httpx
        
    - name: Run Pytest
      working-directory: ./backend
      run: pytest tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
        
    - name: Run Linter
      working-directory: ./frontend
      run: npm run lint
        
    - name: Run Vitest
      working-directory: ./frontend
      run: npm run test -- --run
        
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium
      
    - name: Run Playwright tests
      working-directory: ./frontend
      run: npx playwright test --project=chromium
      
    - name: Upload Playwright Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 14
