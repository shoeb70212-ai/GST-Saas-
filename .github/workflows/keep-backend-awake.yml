name: Keep Backend Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping (15 minute timeout)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping FastAPI Backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          --request GET '${{ secrets.RENDER_BACKEND_URL }}'
