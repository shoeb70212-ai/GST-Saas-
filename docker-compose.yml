version: "3.8"

# Coolify (processstack.online) — SIMPLEST working layout:
#
# 1. Assign ONLY ONE public domain in Coolify:
#      frontend → https://processstack.online:80
# 2. Do NOT assign a public domain to backend (API is /api via nginx).
# 3. Host NSG 8000 = Coolify dashboard — never publish app on host 8000.
#
# Backend listens on container port 8000 (Docker network only).
# Frontend listens on container port 80 (Traefik routes here).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - PORT=8000
      - OPENROUTER_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - PUBLIC_UPLOAD_TOKEN_SECRET
      - BRIDGE_JWT_SECRET
      - RAZORPAY_KEY_ID
      - RAZORPAY_KEY_SECRET
      - RAZORPAY_WEBHOOK_SECRET
      - GSTIN_API_KEY
      - CORS_ORIGINS
      - ENVIRONMENT=production
      - OCR_ENABLED=${OCR_ENABLED:-0}
      - OCR_PROVIDER=${OCR_PROVIDER:-azure}
      - AZURE_DI_ENDPOINT
      - AZURE_DI_KEY
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      - AI_SEMAPHORE_LIMIT=${AI_SEMAPHORE_LIMIT:-3}
      - FILE_SEMAPHORE_LIMIT=${FILE_SEMAPHORE_LIMIT:-2}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=
    restart: unless-stopped
    ports:
      - "80"
    # Do not depend on backend — keep the website up if API crash-loops
    environment:
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - VITE_API_URL=
