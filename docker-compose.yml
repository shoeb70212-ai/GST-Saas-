version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Use bare KEY form (not KEY=${KEY}): unset host vars must NOT become empty
      # strings in the container — that overrides Coolify/.env and crashes startup
      # when main.py requires PUBLIC_UPLOAD_TOKEN_SECRET.
      - OPENROUTER_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - PUBLIC_UPLOAD_TOKEN_SECRET
      - RAZORPAY_KEY_ID
      - RAZORPAY_KEY_SECRET
      - RAZORPAY_WEBHOOK_SECRET
      - GSTIN_API_KEY
      - CORS_ORIGINS
      - ENVIRONMENT=production
      - OCR_ENABLED=${OCR_ENABLED:-0}
      - OCR_PROVIDER=${OCR_PROVIDER:-azure}
      - AZURE_DI_ENDPOINT
      - AZURE_DI_KEY
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - AI_SEMAPHORE_LIMIT=${AI_SEMAPHORE_LIMIT:-3}
      - FILE_SEMAPHORE_LIMIT=${FILE_SEMAPHORE_LIMIT:-2}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      # Same-origin nginx proxy — leave empty
      - VITE_API_URL=
