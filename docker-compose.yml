version: "3.8"

# Coolify / Azure:
# - Host NSG 80 + 443 = Traefik (public HTTPS)
# - Host NSG 8000 = Coolify dashboard ONLY (never publish app ports onto host 8000)
# - Backend container listens on 8000 on the Docker network only (expose, not ports:)
# - Frontend container listens on 80
# Coolify domain fields:
#   frontend → https://processstack.online:80
#   backend  → https://back.processstack.online:8000
#   (:8000 here = container port for Traefik, NOT Azure Coolify UI)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    # Soft check only — do not block frontend with condition: service_healthy
    # (a failed healthcheck previously aborted the whole Coolify deploy).
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      - PORT=8000
      # Bare KEY form: unset host vars must NOT become empty strings (overrides Coolify secrets).
      - OPENROUTER_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - PUBLIC_UPLOAD_TOKEN_SECRET
      - RAZORPAY_KEY_ID
      - RAZORPAY_KEY_SECRET
      - RAZORPAY_WEBHOOK_SECRET
      - GSTIN_API_KEY
      - CORS_ORIGINS
      - ENVIRONMENT=production
      - OCR_ENABLED=${OCR_ENABLED:-0}
      - OCR_PROVIDER=${OCR_PROVIDER:-azure}
      - AZURE_DI_ENDPOINT
      - AZURE_DI_KEY
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - AI_SEMAPHORE_LIMIT=${AI_SEMAPHORE_LIMIT:-3}
      - FILE_SEMAPHORE_LIMIT=${FILE_SEMAPHORE_LIMIT:-2}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    environment:
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - VITE_API_URL=
