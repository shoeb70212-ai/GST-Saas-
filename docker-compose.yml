version: "3.8"

# Coolify notes:
# - Domains MUST include the container port so Traefik gets loadbalancer.server.port:
#     frontend → https://processstack.online:80
#     backend  → https://back.processstack.online:8000
# - Status "Running (Unknown)" usually means port not declared / healthcheck missing.
# - Frontend nginx proxies /api → http://backend:8000 (same compose network).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Required for Coolify/Traefik to discover the listen port
    expose:
      - "8000"
    ports:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      # Bare KEY form: unset host vars must NOT become empty strings (overrides Coolify secrets).
      - OPENROUTER_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - PUBLIC_UPLOAD_TOKEN_SECRET
      - RAZORPAY_KEY_ID
      - RAZORPAY_KEY_SECRET
      - RAZORPAY_WEBHOOK_SECRET
      - GSTIN_API_KEY
      - CORS_ORIGINS
      - ENVIRONMENT=production
      - OCR_ENABLED=${OCR_ENABLED:-0}
      - OCR_PROVIDER=${OCR_PROVIDER:-azure}
      - AZURE_DI_ENDPOINT
      - AZURE_DI_KEY
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - AI_SEMAPHORE_LIMIT=${AI_SEMAPHORE_LIMIT:-3}
      - FILE_SEMAPHORE_LIMIT=${FILE_SEMAPHORE_LIMIT:-2}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - VITE_API_URL=
