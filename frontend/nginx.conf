server {
    listen 80;
    server_name localhost;

    # ZIP batch / invoice uploads exceed nginx's default 1MB body limit (returns 413).
    # Align with backend batch uncompressed cap (50MB) + multipart overhead.
    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Never cache the SPA shell — hashed asset names change every deploy.
    # Stale index.html + missing chunks causes "Failed to fetch dynamically imported module".
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    # Fingerprinted Vite chunks are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Handle React routing, return all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    # This is optional if the frontend calls the backend directly via public URL.
    # However, routing it through Nginx helps avoid CORS issues in some setups.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Large ZIP batches; keep in sync with server-level client_max_body_size
        client_max_body_size 100m;
        proxy_request_buffering on;
        # Adjust timeout if AI scanning / batch queue takes a long time
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
